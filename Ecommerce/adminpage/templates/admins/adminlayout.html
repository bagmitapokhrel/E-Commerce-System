<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <title>{% block title %}Admin Dashboard{% endblock %}</title>

    <style>
        .offcanvas-body ul li {
            padding: 10px 0;
            border-bottom: 1px solid #3d4144;
        }
        .offcanvas-body ul li a:hover {
            color: #D4AF37 !important; /* Gold hover to match boutique theme */
        }
        .admin-sidebar-header {
            border-bottom: 2px solid #D4AF37;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center p-3">
            <h4 class="fw-bold m-0"></h4>
            <button class="btn btn-dark" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRight">
                <i class="fas fa-bars me-2"></i> Menu
            </button>
        </div>

        <div class="offcanvas offcanvas-end bg-dark text-white" tabindex="-1" id="offcanvasRight" style="width:300px;">
            <div class="offcanvas-header">
                <h5 id="offcanvasRightLabel" class="admin-sidebar-header">Management</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
            </div>
            
            <div class="offcanvas-body d-flex flex-column justify-content-between">
                <div>
                    <ul class="list-unstyled">
                        <li><a href="/admin/dashboard" class="text-decoration-none text-white"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a></li>
                        <li><a href="{% url 'admin:auth_user_changelist' %}" class="text-decoration-none text-white"><i class="fas fa-users me-2"></i> Users</a></li>
                        <li><a href="/products/list" class="text-decoration-none text-white"><i class="fas fa-box me-2"></i> Products</a></li>
                        <li><a href="/products/addproduct" class="text-decoration-none text-white ms-4 small text-muted">Add New Product</a></li>
                        <li><a href="/products/category" class="text-decoration-none text-white"><i class="fas fa-tags me-2"></i> Categories</a></li>
                        <li><a href="/products/addcategory" class="text-decoration-none text-white ms-4 small text-muted">Add New Category</a></li>
                        <li><a href="/orders/list" class="text-decoration-none text-white"><i class="fas fa-shopping-cart me-2"></i> Orders</a></li>
                    </ul>
                </div>

                <div class="mt-auto border-top pt-3">
                    <p class="small mb-1"><b>Admin:</b> {{ request.user.username }}</p>
                    <p class="small mb-3"><b>Email:</b> {{ request.user.email }}</p>
                    <a href="/logout" class="btn btn-warning w-100">Logout</a>
                </div>
            </div>
        </div>
    </div>

    <main>
        {% block main_content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
