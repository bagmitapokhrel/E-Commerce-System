<style>
  /* --- LUNIVA BOUTIQUE HEADER --- */
  .luniva-header {
    background-color: #FFFFFF;
    border-bottom: 1px solid #F2F2F2;
    padding: 12px 0 !important;
    font-family: 'Inter', sans-serif;
  }

  /* Logo Control */
  .logo-container img {
    height: 45px;
    width: auto;
    transition: transform 0.4s ease;
  }

  /* --- NAVIGATION: SMALL & SPACED --- */
  .nav-link-main {
    font-family: 'Montserrat', sans-serif;
    color: #1A1A1A;
    font-weight: 300;
    text-transform: uppercase;
    font-size: 11px; /* Small boutique size */
    letter-spacing: 2px;
    text-decoration: none !important;
    position: relative;
    padding-bottom: 4px;
    transition: color 0.3s ease;
  }

  .nav-link-main::after {
    content: '';
    position: absolute;
    width: 0;
    height: 1px;
    bottom: 0;
    left: 0;
    background-color: #D4AF37;
    transition: width 0.3s ease;
  }

  .nav-link-main:hover::after {
    width: 100%;
  }

  /* --- AUTH BUTTONS (SMALL LUXE) --- */
  .btn-lux-sm {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px; /* Tiny, sharp text */
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 16px;
    border-radius: 50px; /* Soft pill shape */
    border: 1px solid #D4AF37;
    color: #D4AF37;
    text-decoration: none !important;
    display: inline-flex;
    align-items: center;
    transition: all 0.4s ease;
  }

  .btn-lux-sm:hover {
    background-color: #D4AF37;
    color: #FFFFFF !important;
    box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
  }

  .btn-lux-dark {
    background-color: #1A1A1A;
    color: #FFFFFF;
    border: 1px solid #1A1A1A;
  }

  /* --- AVATAR FIX --- */
  .header-avatar {
    width: 28px;
    height: 28px;
    object-fit: cover;
    border-radius: 50%;
    border: 1px solid #D4AF37;
  }

  .cart-icon {
    fill: #1A1A1A;
    transition: fill 0.3s ease;
  }
  
  .cart-icon:hover {
    fill: #D4AF37;
  }
</style>

<header class="luniva-header sticky-top">
  <div class="container">
    <div class="d-flex align-items-center justify-content-between">

      <div class="d-flex align-items-center">
        <a href="/" class="logo-container me-5">
          <img src="/static/images/logo.png" alt="Luniva">
        </a>

        <ul class="nav d-none d-lg-flex gap-4">
          <li><a href="/" class="nav-link-main">Home</a></li>
          <li><a href="/productlist" class="nav-link-main">Products</a></li>
          <li><a href="/myorder" class="nav-link-main">Orders</a></li>
        </ul>
      </div>

      <div class="d-flex align-items-center gap-3">
        
        <a href="{% url 'cart' %}" class="me-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" class="bi bi-cart3 cart-icon" viewBox="0 0 16 16">
            <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l.84 4.479 9.144-.459L13.89 4zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2" />
          </svg>
        </a>

        {% if user.is_authenticated %}
          <div class="d-flex align-items-center gap-2">
            <a href="/profile" class="d-flex align-items-center text-decoration-none">
              {% if user.profile.avatar %}
                <img src="{{ user.profile.avatar.url }}" class="header-avatar me-2">
              {% else %}
                <i class="bi bi-person-circle me-2" style="color: #D4AF37; font-size: 20px;"></i>
              {% endif %}
              <span class="btn-lux-sm">{{ user.username }}</span>
            </a>
            
            <a href="{% url 'logout' %}" class="btn-lux-sm btn-lux-dark">Logout</a>
          </div>
        {% else %}
          <a href="{% url 'login' %}" class="btn-lux-sm">Login</a>
          <a href="{% url 'register' %}" class="btn-lux-sm btn-lux-dark">Register</a>
        {% endif %}
      </div>

    </div>
  </div>
</header>
